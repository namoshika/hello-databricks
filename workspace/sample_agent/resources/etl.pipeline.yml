resources:
  pipelines:
    pipeline_agent_etl:
      name: pipeline-agent-etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src"
      configuration:
        src_catalog: ${var.catalog}
        src_schema: default

      libraries:
        - glob:
            include: ../src/etl/transformations/**
      environment:
        dependencies:
          - langchain-google-genai>=4.1.3
          - databricks-langchain>=0.12.1
